<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading…</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,900;1,9..40,300;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: oklch(10% 0.01 240);
      --ink2: oklch(38% 0.01 240);
      --ink3: oklch(58% 0.01 240);
      --paper: oklch(97% 0.005 240);
      --accent: oklch(52% 0.20 245);
      --accent2: oklch(72% 0.16 80);
      --dark: oklch(9% 0.015 245);
      --dark2: oklch(14% 0.015 245);
      --dark3: oklch(20% 0.015 245);
    }
    html { scroll-behavior: smooth; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: oklch(9% 0.015 245); }
    ::-webkit-scrollbar-thumb { background: oklch(28% 0.02 245); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: oklch(40% 0.03 245); }
    * { scrollbar-width: thin; scrollbar-color: oklch(28% 0.02 245) oklch(9% 0.015 245); }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: #fff;
      overflow-x: hidden;
    }

    /* ── Reveal ── */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.75s cubic-bezier(0.16,1,0.3,1), transform 0.75s cubic-bezier(0.16,1,0.3,1);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.45s; }

    /* ── Nav ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 0 48px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(9,10,18,0); backdrop-filter: blur(0px);
      transition: background 0.4s, backdrop-filter 0.4s;
    }
    nav.scrolled {
      background: rgba(9,10,18,0.85);
      backdrop-filter: blur(20px) saturate(160%);
      border-bottom: 1px solid oklch(22% 0.015 245);
    }
    .nav-logo { font-family: 'DM Serif Display', serif; font-size: 18px; font-weight: 400; letter-spacing: -0.01em; color: #fff; }
    .nav-links { display: flex; gap: 32px; align-items: center; }
    .nav-links a { font-size: 13px; font-weight: 500; color: oklch(72% 0.008 240); text-decoration: none; letter-spacing: 0.01em; transition: color 0.2s; }
    .nav-links a:hover { color: #fff; }
    .nav-cta { padding: 8px 18px; background: var(--accent); color: #fff !important; border-radius: 999px; font-size: 13px !important; font-weight: 600 !important; }

    /* ── Hero ── */
    #hero {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 120px 48px 80px; position: relative; overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 40%, oklch(22% 0.06 265) 0%, oklch(9% 0.015 245) 70%);
      z-index: 0;
    }
    .hero-grid {
      position: absolute; inset: 0;
      background-image: linear-gradient(oklch(100% 0 0 / 0.03) 1px, transparent 1px), linear-gradient(90deg, oklch(100% 0 0 / 0.03) 1px, transparent 1px);
      background-size: 60px 60px; z-index: 0;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }
    .hero-content { position: relative; z-index: 1; max-width: 900px; }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 16px; border: 1px solid oklch(35% 0.06 245); border-radius: 999px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      color: oklch(72% 0.16 80); background: oklch(14% 0.02 245); margin-bottom: 32px;
    }
    .hero-eyebrow::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: oklch(72% 0.16 80); animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    .hero-name {
      font-family: 'DM Serif Display', serif; font-size: clamp(64px,10vw,120px);
      font-weight: 400; line-height: 0.92; letter-spacing: -0.03em; margin-bottom: 24px; color: #fff;
    }
    .hero-name em {
      font-style: italic;
      background: linear-gradient(90deg, oklch(82% 0.12 245) 0%, oklch(48% 0.28 245) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero-sub { font-size: clamp(16px,2vw,20px); color: oklch(62% 0.008 240); font-weight: 400; line-height: 1.6; max-width: 560px; margin: 0 auto 48px; }
    .hero-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      padding: 14px 28px; background: #fff; color: var(--ink); border: none; border-radius: 999px;
      font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif;
      text-decoration: none; display: inline-block; transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-primary:hover { transform: scale(1.03); box-shadow: 0 8px 32px rgba(255,255,255,0.15); }
    .btn-ghost {
      padding: 14px 28px; background: transparent; color: #fff; border: 1px solid oklch(35% 0.015 245);
      border-radius: 999px; font-size: 14px; font-weight: 500; cursor: pointer;
      font-family: 'DM Sans', sans-serif; text-decoration: none; display: inline-block;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-ghost:hover { border-color: oklch(55% 0.015 245); background: oklch(16% 0.015 245); }
    .hero-scroll-hint {
      position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      color: oklch(42% 0.008 240); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; z-index: 1;
    }
    .scroll-arrow {
      width: 20px; height: 20px; border-right: 1.5px solid oklch(38% 0.01 240);
      border-bottom: 1.5px solid oklch(38% 0.01 240); transform: rotate(45deg); animation: scrollBob 1.8s infinite;
    }
    @keyframes scrollBob {
      0%, 100% { transform: rotate(45deg) translateY(0); opacity: 0.5; }
      50% { transform: rotate(45deg) translateY(4px); opacity: 1; }
    }

    /* ── Section base ── */
    section { padding: 120px 48px; }
    .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent2); margin-bottom: 20px; }

    /* ── About ── */
    #about {
      background: var(--dark); display: grid; grid-template-columns: 1fr 1fr;
      gap: 80px; align-items: center; max-width: 1200px; margin: 0 auto;
    }
    .about-headline { font-family: 'DM Serif Display', serif; font-size: clamp(36px,4vw,52px); font-weight: 400; line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 24px; }
    .about-body { font-size: 17px; line-height: 1.8; color: oklch(65% 0.008 240); }
    .about-body p + p { margin-top: 16px; }
    .about-stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
      background: oklch(22% 0.015 245); border: 1px solid oklch(22% 0.015 245);
      border-radius: 16px; overflow: hidden;
    }
    .about-stat { background: var(--dark2); padding: 28px 24px; display: flex; flex-direction: column; gap: 6px; }
    .stat-num { font-family: 'DM Serif Display', serif; font-size: 40px; font-weight: 400; color: #fff; letter-spacing: -0.02em; line-height: 1; }
    .stat-label { font-size: 13px; color: oklch(52% 0.01 240); font-weight: 500; }

    /* ── Experience ── */
    #experience { background: oklch(7% 0.012 245); }
    .exp-inner { max-width: 1000px; margin: 0 auto; }
    .exp-heading { font-family: 'DM Serif Display', serif; font-size: clamp(40px,5vw,64px); font-weight: 400; letter-spacing: -0.02em; margin-bottom: 64px; line-height: 1.05; }
    .exp-heading span { background: linear-gradient(90deg, oklch(82% 0.12 245) 0%, oklch(48% 0.28 245) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-style: italic; }
    .exp-list { display: flex; flex-direction: column; }
    .exp-item { display: grid; grid-template-columns: 220px 1fr; gap: 40px; padding: 40px 0; border-top: 1px solid oklch(18% 0.015 245); transition: background 0.2s; }
    .exp-item:last-child { border-bottom: 1px solid oklch(18% 0.015 245); }
    .exp-period { font-size: 14px; font-weight: 700; color: var(--accent2); margin-bottom: 4px; }
    .exp-type { font-size: 12px; color: oklch(42% 0.01 240); font-weight: 500; }
    .exp-company { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; color: #fff; margin-bottom: 4px; letter-spacing: -0.01em; }
    .exp-role { font-size: 14px; color: var(--accent); font-weight: 600; margin-bottom: 18px; }
    .exp-bullets { list-style: none; padding: 0; margin: 0 0 18px; display: flex; flex-direction: column; gap: 8px; }
    .exp-bullets li { font-size: 15px; line-height: 1.6; color: oklch(62% 0.008 240); padding-left: 18px; position: relative; }
    .exp-bullets li::before { content: ''; position: absolute; left: 0; top: 10px; width: 5px; height: 5px; border-radius: 50%; background: oklch(35% 0.06 245); }
    .exp-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 500; border: 1px solid; }
    .tag-engine   { background: oklch(18% 0.06 245); color: oklch(72% 0.14 245); border-color: oklch(28% 0.08 245); }
    .tag-language { background: oklch(18% 0.06 270); color: oklch(72% 0.14 270); border-color: oklch(28% 0.08 270); }
    .tag-library  { background: oklch(18% 0.06 150); color: oklch(68% 0.12 150); border-color: oklch(28% 0.08 150); }
    .tag-tool     { background: oklch(18% 0.06 60);  color: oklch(72% 0.14 60);  border-color: oklch(28% 0.08 60);  }
    .tag-domain   { background: oklch(18% 0.06 20);  color: oklch(72% 0.12 20);  border-color: oklch(28% 0.08 20);  }
    .tag-pattern  { background: oklch(18% 0.06 320); color: oklch(72% 0.12 320); border-color: oklch(28% 0.08 320); }

    /* ── Projects ── */
    #projects { background: var(--dark); }
    .projects-intro { max-width: 1000px; margin: 0 auto; padding: 120px 48px 80px; }
    .projects-heading { font-family: 'DM Serif Display', serif; font-size: clamp(40px,5vw,64px); font-weight: 400; letter-spacing: -0.02em; margin-bottom: 64px; line-height: 1.05; }
    .projects-heading span { background: linear-gradient(90deg, oklch(85% 0.14 80) 0%, oklch(58% 0.22 60) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-style: italic; }
    .scroller-track { position: relative; height: 180vh; }
    .project-sticky-scene { position: sticky; top: 0; height: 100vh; overflow: hidden; display: block; }
    .sticky-screenshot {
      position: absolute; inset: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(-45deg, oklch(12% 0.015 245) 0px, oklch(12% 0.015 245) 14px, oklch(16% 0.015 245) 14px, oklch(16% 0.015 245) 28px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.7s cubic-bezier(0.16,1,0.3,1); cursor: default;
    }
    .sticky-screenshot.show { opacity: 1; }
    .sticky-screenshot img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .sticky-screenshot-label { font-family: monospace; font-size: 13px; color: oklch(38% 0.01 240); position: relative; z-index: 1; }
    .sticky-vignette { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.45) 100%); pointer-events: none; z-index: 2; }
    .sticky-header { position: absolute; top: 60px; left: 0; right: 0; z-index: 20; padding: 20px 40px; display: flex; align-items: flex-start; justify-content: space-between; opacity: 0; transition: opacity 0.5s ease; pointer-events: none; }
    .sticky-header.show { opacity: 1; pointer-events: auto; }
    .sticky-header-left { background: linear-gradient(to right, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 100%); padding: 12px 48px 24px 0; border-radius: 0 0 8px 0; }
    .sticky-header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; background: linear-gradient(to left, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0) 100%); padding: 12px 0 24px 48px; border-radius: 0 0 0 8px; }
    .sticky-project-title { font-family: 'DM Serif Display', serif; font-size: clamp(24px,3vw,44px); font-weight: 400; letter-spacing: -0.02em; background: linear-gradient(90deg, oklch(82% 0.12 245) 0%, oklch(48% 0.28 245) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .status-dot { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .status-dot::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
    .status-finished { background: oklch(18% 0.07 150); color: oklch(68% 0.16 150); }
    .status-finished::before { background: oklch(58% 0.20 150); }
    .status-active { background: oklch(18% 0.07 245); color: oklch(68% 0.18 245); }
    .status-active::before { background: oklch(58% 0.22 245); }
    .project-genre { font-size: 12px; color: oklch(45% 0.01 240); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
    .tech-circles-row { position: absolute; bottom: 36px; left: 40px; z-index: 10; display: flex; gap: 14px; flex-wrap: wrap; max-width: 55%; }
    .tech-circle {
      position: relative; width: 64px; height: 64px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.25); background: rgba(10,12,24,0.65);
      backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center;
      cursor: default; opacity: 0; transform: scale(0.4) translateY(20px);
      transition: opacity 0.4s cubic-bezier(0.34,1.56,0.64,1), transform 0.4s cubic-bezier(0.34,1.56,0.64,1), border-color 0.2s, background 0.2s;
    }
    .tech-circle.popped { opacity: 1; transform: scale(1) translateY(0); }
    .tech-circle:hover, .tech-circle.active { border-color: var(--accent2); background: rgba(20,24,48,0.88); z-index: 20; }
    .tech-circle-label { font-size: 10px; font-weight: 700; text-align: center; line-height: 1.2; color: #fff; user-select: none; padding: 0 4px; }
    .sticky-info-panel {
      position: absolute; top: 80px; right: 0; bottom: 0; transform: translateX(102%);
      width: 320px; background: rgba(9,10,20,0.28); backdrop-filter: blur(8px) saturate(130%);
      -webkit-backdrop-filter: blur(8px) saturate(130%); border-left: 1px solid rgba(255,255,255,0.12);
      padding: 100px 32px 48px; z-index: 30; pointer-events: none; opacity: 0;
      display: flex; flex-direction: column; justify-content: center; gap: 0;
      transition: opacity 0.28s ease, transform 0.35s cubic-bezier(0.16,1,0.3,1);
    }
    .sticky-info-panel.visible { opacity: 1; transform: translateX(0); pointer-events: auto; }
    .info-panel-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent2); margin-bottom: 12px; }
    .info-panel-title { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; color: #fff; margin-bottom: 14px; letter-spacing: -0.01em; line-height: 1.15; }
    .info-panel-body { font-size: 14px; line-height: 1.75; color: oklch(72% 0.008 240); }
    .sticky-scroll-hint { position: absolute; bottom: 40px; right: 40px; z-index: 10; font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 0.08em; opacity: 1; transition: opacity 0.3s; pointer-events: none; }
    .sticky-scroll-hint.hide { opacity: 0; }

    /* ── Skills ── */
    #skills { background: oklch(7% 0.012 245); text-align: center; }
    .skills-inner { max-width: 900px; margin: 0 auto; }
    .skills-heading { font-family: 'DM Serif Display', serif; font-size: clamp(36px,5vw,56px); font-weight: 400; letter-spacing: -0.02em; margin-bottom: 16px; line-height: 1.05; }
    .skills-sub { font-size: 17px; color: oklch(52% 0.008 240); margin-bottom: 56px; }
    .skills-group { margin-bottom: 36px; }
    .skills-group-label { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: oklch(40% 0.01 240); margin-bottom: 14px; }
    .skills-bubbles { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }

    /* ── Contact ── */
    #contact { background: #fff; color: var(--ink); text-align: center; padding: 100px 48px 80px; }
    .contact-heading { font-family: 'DM Serif Display', serif; font-size: clamp(40px,5vw,64px); font-weight: 400; letter-spacing: -0.03em; line-height: 1.0; margin-bottom: 20px; color: var(--ink); }
    .contact-heading em { background: linear-gradient(90deg, oklch(82% 0.12 245) 0%, oklch(48% 0.28 245) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .contact-sub { font-size: 17px; color: var(--ink2); margin-bottom: 48px; max-width: 480px; margin-left: auto; margin-right: auto; }
    .contact-links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-bottom: 72px; }
    .contact-link { padding: 14px 28px; border: 1.5px solid oklch(80% 0.01 240); border-radius: 999px; font-size: 14px; font-weight: 600; color: var(--ink); text-decoration: none; transition: border-color 0.2s, background 0.2s; }
    .contact-link:hover { border-color: var(--ink); background: oklch(94% 0.005 240); }
    .contact-link.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
    .contact-link.primary:hover { background: oklch(22% 0.01 240); }
    .footer-line { font-size: 12px; color: oklch(65% 0.01 240); }
  </style>
</head>
<body>

<!-- Shells — filled by JS after JSON loads -->
<nav id="main-nav">
  <div class="nav-logo" id="nav-logo"></div>
  <div class="nav-links" id="nav-links"></div>
</nav>

<section id="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>
  <div class="hero-content">
    <div class="hero-eyebrow reveal" id="hero-eyebrow"></div>
    <h1 class="hero-name reveal reveal-delay-1" id="hero-name"></h1>
    <p class="hero-sub reveal reveal-delay-2" id="hero-sub"></p>
    <div class="hero-actions reveal reveal-delay-3" id="hero-actions"></div>
  </div>
  <div class="hero-scroll-hint">
    <span>Scroll</span>
    <div class="scroll-arrow"></div>
  </div>
</section>

<section style="background: var(--dark); padding: 120px 48px;">
  <div id="about">
    <div>
      <div class="section-label reveal" id="about-label"></div>
      <h2 class="about-headline reveal reveal-delay-1" id="about-headline"></h2>
      <div class="about-body reveal reveal-delay-2" id="about-body"></div>
    </div>
    <div class="about-stats reveal reveal-delay-2" id="about-stats"></div>
  </div>
</section>

<section id="experience">
  <div class="exp-inner">
    <div class="section-label reveal" id="exp-label"></div>
    <h2 class="exp-heading reveal reveal-delay-1" id="exp-heading"></h2>
    <div class="exp-list" id="exp-list"></div>
  </div>
</section>

<div id="projects">
  <div class="projects-intro">
    <div class="section-label reveal" id="projects-label"></div>
    <h2 class="projects-heading reveal reveal-delay-1" id="projects-heading"></h2>
  </div>
  <div id="projects-tracks"></div>
</div>

<section id="skills">
  <div class="skills-inner">
    <div class="section-label reveal" id="skills-label" style="text-align:center; display:block;"></div>
    <h2 class="skills-heading reveal reveal-delay-1" id="skills-heading"></h2>
    <p class="skills-sub reveal reveal-delay-2" id="skills-sub"></p>
    <div id="skills-groups"></div>
  </div>
</section>

<section id="contact">
  <div class="section-label reveal" id="contact-label" style="color: var(--accent); display:block; text-align:center;"></div>
  <h2 class="contact-heading reveal reveal-delay-1" id="contact-heading"></h2>
  <p class="contact-sub reveal reveal-delay-2" id="contact-sub"></p>
  <div class="contact-links reveal reveal-delay-3" id="contact-links"></div>
  <div class="footer-line reveal reveal-delay-4" id="footer-line"></div>
</section>

<script>
// ─────────────────────────────────────────────
// Render helpers
// ─────────────────────────────────────────────
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}

function buildNav(nav) {
  document.getElementById('nav-logo').textContent = nav.logo;
  const linksEl = document.getElementById('nav-links');
  nav.links.forEach(l => {
    const a = el('a', '', l.label);
    a.href = l.href;
    linksEl.appendChild(a);
  });
  const cta = el('a', 'nav-cta', nav.cta.label);
  cta.href = nav.cta.href;
  linksEl.appendChild(cta);
}

function buildHero(hero) {
  document.getElementById('hero-eyebrow').textContent = hero.eyebrow;
  document.getElementById('hero-name').innerHTML =
    hero.nameLine1 + '<br /><em>' + hero.nameLine2 + '</em>';
  document.getElementById('hero-sub').textContent = hero.subtitle;
  const acts = document.getElementById('hero-actions');
  const p = el('a', 'btn-primary', hero.ctaPrimary.label);
  p.href = hero.ctaPrimary.href;
  const g = el('a', 'btn-ghost', hero.ctaSecondary.label);
  g.href = hero.ctaSecondary.href;
  acts.appendChild(p);
  acts.appendChild(g);
}

function buildAbout(about) {
  document.getElementById('about-label').textContent = about.sectionLabel;
  document.getElementById('about-headline').innerHTML =
    about.headline + '<br /><em style="font-style:italic;display:inline-block;background:linear-gradient(90deg,oklch(85% 0.14 80) 0%,oklch(58% 0.22 60) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">'
    + about.headlineAccent + '</em>';
  const body = document.getElementById('about-body');
  about.paragraphs.forEach(p => body.appendChild(el('p', '', p)));
  const stats = document.getElementById('about-stats');
  about.stats.forEach(s => {
    const stat = el('div', 'about-stat');
    stat.appendChild(el('div', 'stat-num', s.value));
    stat.appendChild(el('div', 'stat-label', s.label));
    stats.appendChild(stat);
  });
}

function buildExperience(exp) {
  document.getElementById('exp-label').textContent = exp.sectionLabel;
  document.getElementById('exp-heading').innerHTML =
    exp.heading + '<br /><span>' + exp.headingAccent + '</span>';
  const list = document.getElementById('exp-list');
  exp.items.forEach(item => {
    const row = el('div', 'exp-item reveal');
    const meta = el('div', 'exp-meta');
    meta.appendChild(el('div', 'exp-period', item.period));
    meta.appendChild(el('div', 'exp-type', item.type));
    const body = el('div', 'exp-body');
    body.appendChild(el('div', 'exp-company', item.company));
    body.appendChild(el('div', 'exp-role', item.role));
    const bullets = el('ul', 'exp-bullets');
    item.bullets.forEach(b => bullets.appendChild(el('li', '', b)));
    const tags = el('div', 'exp-tags');
    item.tags.forEach(t => tags.appendChild(el('span', 'tag tag-' + t.type, t.label)));
    body.appendChild(bullets);
    body.appendChild(tags);
    row.appendChild(meta);
    row.appendChild(body);
    list.appendChild(row);
  });
}

function buildProjectTrack(project, i) {
  const track = el('div', 'scroller-track');
  track.id = 'track-' + i;

  const scene = el('div', 'project-sticky-scene');
  scene.id = 'sticky-' + i;

  // Screenshot placeholder
  const ss = el('div', 'sticky-screenshot');
  ss.id = 'screenshot-' + i;
  ss.appendChild(el('div', 'sticky-screenshot-label', project.screenshotLabel));
  scene.appendChild(ss);

  scene.appendChild(el('div', 'sticky-vignette'));

  // Header
  const header = el('div', 'sticky-header');
  header.id = 'header-' + i;
  const hl = el('div', 'sticky-header-left');
  hl.appendChild(el('div', 'sticky-project-title', project.title));
  const hr = el('div', 'sticky-header-right');
  hr.appendChild(el('span', 'status-dot status-' + project.status, project.statusLabel));
  hr.appendChild(el('span', 'project-genre', project.genre));
  header.appendChild(hl);
  header.appendChild(hr);
  scene.appendChild(header);

  // Tech circles
  const circlesRow = el('div', 'tech-circles-row');
  circlesRow.id = 'circles-' + i;
  project.techs.forEach((tech, idx) => {
    const circle = el('div', 'tech-circle');
    circle.dataset.index = idx;
    circle.dataset.title = tech.label;
    circle.dataset.desc  = tech.desc;
    const lbl = el('div', 'tech-circle-label');
    lbl.innerHTML = tech.shortLabel.replace('\n', '<br />');
    circle.appendChild(lbl);
    circlesRow.appendChild(circle);
  });
  scene.appendChild(circlesRow);

  // Info panel
  const panel = el('div', 'sticky-info-panel');
  panel.id = 'panel-' + i;
  const eyebrow = el('div', 'info-panel-eyebrow', 'Project');
  eyebrow.id = 'panel-' + i + '-eyebrow';
  const ptitle = el('div', 'info-panel-title', project.title);
  ptitle.id = 'panel-' + i + '-title';
  const pbody = el('div', 'info-panel-body', project.description);
  pbody.id = 'panel-' + i + '-body';
  panel.appendChild(eyebrow);
  panel.appendChild(ptitle);
  panel.appendChild(pbody);
  scene.appendChild(panel);

  // Scroll hint
  const hint = el('div', 'sticky-scroll-hint', 'scroll to reveal ↓');
  hint.id = 'hint-' + i;
  scene.appendChild(hint);

  track.appendChild(scene);
  return track;
}

function buildProjects(projects) {
  document.getElementById('projects-label').textContent = projects.sectionLabel;
  document.getElementById('projects-heading').innerHTML =
    projects.heading + '<br /><span>' + projects.headingAccent + '</span>';
  const container = document.getElementById('projects-tracks');
  projects.items.forEach((p, i) => container.appendChild(buildProjectTrack(p, i)));
}

function buildSkills(skills) {
  document.getElementById('skills-label').textContent = skills.sectionLabel;
  document.getElementById('skills-heading').innerHTML =
    skills.heading + '<br />' + skills.headingLine2;
  document.getElementById('skills-sub').textContent = skills.subtitle;
  const groups = document.getElementById('skills-groups');
  const delays = ['reveal-delay-2', 'reveal-delay-3', 'reveal-delay-4'];
  skills.groups.forEach((g, gi) => {
    const group = el('div', 'skills-group reveal ' + (delays[gi] || 'reveal-delay-4'));
    group.appendChild(el('div', 'skills-group-label', g.label));
    const bubbles = el('div', 'skills-bubbles');
    g.items.forEach(item => bubbles.appendChild(el('span', 'tag tag-' + item.type, item.label)));
    group.appendChild(bubbles);
    groups.appendChild(group);
  });
}

function buildContact(contact) {
  document.getElementById('contact-label').textContent = contact.sectionLabel;
  document.getElementById('contact-heading').innerHTML =
    contact.heading + '<br /><em>' + contact.headingAccent + '</em>';
  document.getElementById('contact-sub').textContent = contact.subtitle;
  document.getElementById('footer-line').textContent = contact.footerLine;

  const linksEl = document.getElementById('contact-links');

  // Email — assembled by JS to avoid scrapers
  const emailLink = el('a', 'contact-link primary');
  const addr = contact.email.user + '@' + contact.email.domain;
  emailLink.href = 'mailto:' + addr;
  emailLink.textContent = addr;
  linksEl.appendChild(emailLink);

  contact.links.forEach(l => {
    const a = el('a', 'contact-link', l.label);
    a.href = l.href;
    linksEl.appendChild(a);
  });
}

// ─────────────────────────────────────────────
// Interactions (nav scroll, reveal, projects)
// ─────────────────────────────────────────────
const STEP_PX = 120;
const UNLOCK_EXTRA = 100;

function initInteractions(numProjects, projectDescs) {
  // Nav
  const nav = document.getElementById('main-nav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 40);
  }, { passive: true });

  // Reveal
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  setTimeout(() => {
    document.querySelectorAll('#hero .reveal').forEach(el => el.classList.add('visible'));
  }, 100);

  // Project hover panels
  function showPanel(i, eyebrow, title, body) {
    document.getElementById('panel-' + i + '-eyebrow').textContent = eyebrow;
    document.getElementById('panel-' + i + '-title').textContent = title;
    document.getElementById('panel-' + i + '-body').textContent = body;
    document.getElementById('panel-' + i).classList.add('visible');
  }
  function hidePanel(i) {
    document.getElementById('panel-' + i).classList.remove('visible');
  }

  function wireHovers(i) {
    const screenshot = document.getElementById('screenshot-' + i);
    const circles = document.querySelectorAll('#circles-' + i + ' .tech-circle');
    const panel = document.getElementById('panel-' + i);
    const proj = projectDescs[i];
    const totalCircles = circles.length;

    function allPopped() {
      return document.querySelectorAll('#circles-' + i + ' .tech-circle.popped').length >= totalCircles;
    }

    screenshot.addEventListener('mouseenter', () => {
      if (!allPopped()) return;
      showPanel(i, 'About', proj.title, proj.description);
    });
    screenshot.addEventListener('mouseleave', e => {
      if (!e.relatedTarget || !e.relatedTarget.closest('#panel-' + i)) hidePanel(i);
    });
    panel.addEventListener('mouseleave', e => {
      if (!e.relatedTarget || (!e.relatedTarget.closest('#screenshot-' + i) && !e.relatedTarget.closest('#circles-' + i))) hidePanel(i);
    });
    circles.forEach(circle => {
      circle.addEventListener('mouseenter', () => {
        if (!allPopped()) return;
        circles.forEach(c => c.classList.remove('active'));
        circle.classList.add('active');
        showPanel(i, 'Technology', circle.dataset.title, circle.dataset.desc);
      });
      circle.addEventListener('mouseleave', e => {
        circle.classList.remove('active');
        if (!e.relatedTarget || (!e.relatedTarget.closest('#panel-' + i) && !e.relatedTarget.closest('#circles-' + i))) hidePanel(i);
      });
    });
  }

  for (let i = 0; i < numProjects; i++) wireHovers(i);

  // Scroll-jacked project reveals
  function onScroll() {
    for (let i = 0; i < numProjects; i++) {
      const track      = document.getElementById('track-' + i);
      const screenshot = document.getElementById('screenshot-' + i);
      const header     = document.getElementById('header-' + i);
      const hint       = document.getElementById('hint-' + i);
      const circles    = document.querySelectorAll('#circles-' + i + ' .tech-circle');
      const totalCircles = circles.length;
      const scrolledIn = -track.getBoundingClientRect().top;

      if (scrolledIn < 0) {
        screenshot.classList.remove('show');
        header.classList.remove('show');
        circles.forEach(c => c.classList.remove('popped'));
        continue;
      }
      header.classList.add('show');
      if (!screenshot.classList.contains('show')) {
        setTimeout(() => screenshot.classList.add('show'), 80);
      }
      const circlesTarget = Math.min(totalCircles, Math.floor((scrolledIn - 60) / STEP_PX));
      circles.forEach((c, idx) => {
        if (idx < circlesTarget) c.classList.add('popped');
      });
      const allPopped = circlesTarget >= totalCircles;
      screenshot.style.cursor = allPopped ? 'pointer' : 'default';
      circles.forEach(c => { c.style.cursor = allPopped ? 'pointer' : 'default'; });
      const unlockThreshold = 60 + totalCircles * STEP_PX + UNLOCK_EXTRA;
      hint.classList.toggle('hide', scrolledIn >= unlockThreshold);
    }
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
}

// ─────────────────────────────────────────────
// Bootstrap: fetch JSON → build → wire
// ─────────────────────────────────────────────
fetch('portfolio-content.json')
  .then(r => r.json())
  .then(data => {
    document.title = data.meta.title;
    buildNav(data.nav);
    buildHero(data.hero);
    buildAbout(data.about);
    buildExperience(data.experience);
    buildProjects(data.projects);
    buildSkills(data.skills);
    buildContact(data.contact);
    initInteractions(data.projects.items.length, data.projects.items);
  })
  .catch(err => {
    console.error('Could not load portfolio-content.json:', err);
    document.body.innerHTML = '<p style="color:#fff;padding:40px;font-family:monospace;">Error loading portfolio-content.json — make sure the file is in the same folder as this HTML.</p>';
  });
</script>
